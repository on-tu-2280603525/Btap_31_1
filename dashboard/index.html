<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Product Dashboard</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        tbody tr:nth-child(even) {
            background: #f2f2f2;
        }

        tbody tr:nth-child(odd) {
            background: white;
        }

        img {
            width: 80px;
            height: 80px;
            object-fit: cover;
        }

        th {
            cursor: pointer;
            background: #ddd;
        }

        .title-cell {
            position: relative;
        }

        .desc {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 10px;
            width: 250px;
            border-radius: 6px;
            z-index: 10;
        }

        .title-cell:hover .desc {
            display: block;
        }

        #pagination button {
            margin: 5px 3px;
            padding: 5px 10px;
            cursor: pointer;
        }

        #pagination button.active {
            background: black;
            color: white;
        }
    </style>
</head>

<body>

    <h2>Product Dashboard</h2>

    <input type="text" id="searchInput" placeholder="Tìm theo title">

    <select id="pageSize">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>Image</th>
                <th onclick="sortByTitle()">Title ⬍</th>
                <th onclick="sortByPrice()">Price ⬍</th>
                <th>Category</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

    <div id="pagination"></div>

    <script src="script.js"></script>

</body>

</html>
